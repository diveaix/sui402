name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Security token leak guard
        run: npm run security:check

      - name: Production dependency audit
        run: npm run dependency:audit

      - name: NPM package dry-run guard
        run: npm run package:check

      - name: Launch readiness guard self-test
        run: npm run launch:guard:check

      - name: Packaged CLI clean-install guard
        run: npm run package:clean-install

  move:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Sui CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sSfL https://raw.githubusercontent.com/MystenLabs/suiup/main/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/suiup" install sui@testnet -y

      - name: Move tests
        working-directory: move/sui402_sessions
        run: sui move test
